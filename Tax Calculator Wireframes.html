<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>tus impuestos — wireframes</title>
<meta name="viewport" content="width=1400" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ecebe6; font-family: 'JetBrains Mono', monospace; color: #1a1a1a; }
  * { box-sizing: border-box; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframe-kit.jsx"></script>
<script type="text/babel" src="variations-1-2.jsx"></script>
<script type="text/babel" src="variations-3-4.jsx"></script>
<script type="text/babel" src="variations-5.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showBreakdown": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Resultado">
          <TweakToggle label="Mostrar desglose" value={t.showBreakdown}
            onChange={(v) => setTweak('showBreakdown', v)} />
        </TweakSection>
        <div style={{ fontSize: 11, color: '#888', padding: '4px 2px', lineHeight: 1.5 }}>
          Aplica a las 5 variaciones simultáneamente para comparar la versión <em>con</em> y <em>sin</em> desglose.
        </div>
      </TweaksPanel>

      <DesignCanvas title="tus impuestos · wireframes"
        subtitle="5 enfoques distintos para una calculadora de IRPF · IRPF Madrid 2026, datos de ejemplo">
        <DCSection id="variations" title="Variaciones"
          subtitle="Todas comparten los mismos inputs (situación, bruto, perfil, deducciones) pero los presentan de forma distinta. Arrastra para reordenar · clic en el título para abrir en grande.">
          <DCArtboard id="v1" label="V1 · Split clásico" width={1100} height={720}>
            <V1ClassicSplit showBreakdown={t.showBreakdown} />
          </DCArtboard>
          <DCArtboard id="v2" label="V2 · Recibo / calculadora" width={1100} height={720}>
            <V2Receipt showBreakdown={t.showBreakdown} />
          </DCArtboard>
          <DCArtboard id="v3" label="V3 · Asistente paso a paso" width={1100} height={720}>
            <V3Wizard showBreakdown={t.showBreakdown} />
          </DCArtboard>
          <DCArtboard id="v4" label="V4 · Comparador A / B" width={1100} height={720}>
            <V4Compare showBreakdown={t.showBreakdown} />
          </DCArtboard>
          <DCArtboard id="v5" label="V5 · Panel what-if" width={1100} height={720}>
            <V5Dashboard showBreakdown={t.showBreakdown} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
